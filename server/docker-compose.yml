version: "3.8"

services:

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"

  auth:
    build: ./auth-service
    ports:
      - "5001:5001"

  product:
    build: ./product-service
    ports:
      - "5002:5002"

  order:
    build: ./order-service
    ports:
      - "5003:5003"

  payment:
    build: ./payment-service
    ports:
      - "5004:5004"